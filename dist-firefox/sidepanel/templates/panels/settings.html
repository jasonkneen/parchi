<div id="settingsPanel" class="right-panel-content hidden" data-panel="settings">
    <div class="panel-header">
        <span class="panel-title">Settings</span>
    </div>
    <div class="settings-content">
        <div class="settings-tabs">
            <button id="settingsTabSetupBtn" class="settings-tab-button active" data-tab="setup">Setup</button>
            <button id="settingsTabModelBtn" class="settings-tab-button" data-tab="model">Model</button>
            <button id="settingsTabBrowserBtn" class="settings-tab-button" data-tab="browser">Browser</button>
            <button id="settingsTabNetworkBtn" class="settings-tab-button" data-tab="network">Network</button>
            <button id="settingsTabProfilesBtn" class="settings-tab-button" data-tab="profiles">Profiles</button>
        </div>
        <div id="settingsTabSetup" class="tab-panel" data-tab="setup"></div>
        <div id="settingsTabModel" class="tab-panel hidden" data-tab="model"></div>
        <div id="settingsTabBrowser" class="tab-panel hidden" data-tab="browser"></div>
        <div id="settingsTabNetwork" class="tab-panel hidden" data-tab="network"></div>
        <div id="settingsTabProfiles" class="tab-panel hidden" data-tab="profiles"></div>
    </div>
</div>
