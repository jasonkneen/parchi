<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Parchi logo">
  <defs>
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#c084e0"/>
      <stop offset="40%" stop-color="#9b4dca"/>
      <stop offset="100%" stop-color="#5b21a0"/>
    </linearGradient>
    <radialGradient id="sh" cx="0.35" cy="0.25" r="0.5">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Body — bell/dome shape, flat bottom -->
  <path d="
    M 16 108
    L 112 108
    L 112 62
    C 112 22, 92 6, 64 6
    C 36 6, 16 22, 16 62
    Z
  " fill="url(#bg)"/>

  <!-- Sheen overlay — top-left highlight -->
  <path d="
    M 16 62
    C 16 22, 36 6, 64 6
    C 92 6, 112 22, 112 62
    L 112 72
    C 98 72, 88 32, 64 18
    C 44 18, 28 42, 24 72
    L 16 72
    Z
  " fill="url(#sh)"/>

  <!-- Left eye -->
  <circle cx="46" cy="64" r="14" fill="#fff"/>
  <!-- Right eye -->
  <circle cx="82" cy="64" r="14" fill="#fff"/>

  <!-- Left pupil (subtle inner shadow) -->
  <circle cx="46" cy="66" r="6" fill="rgba(90,30,130,0.08)"/>
  <!-- Right pupil (subtle inner shadow) -->
  <circle cx="82" cy="66" r="6" fill="rgba(90,30,130,0.08)"/>

  <!-- Bubbles — top right -->
  <circle cx="106" cy="14" r="7" fill="rgba(180,130,220,0.5)"/>
  <circle cx="116" cy="28" r="4.5" fill="rgba(180,130,220,0.35)"/>
  <circle cx="120" cy="10" r="3" fill="rgba(180,130,220,0.25)"/>
</svg>
