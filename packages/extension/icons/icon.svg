<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Parchi logo">
  <defs>
    <linearGradient id="stroke-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Squircle outline — the frame IS the head shape -->
  <path
    d="M64 12
       C 34 12 12 34 12 64
       C 12 94 34 116 64 116
       C 94 116 116 94 116 64
       C 116 34 94 12 64 12 Z"
    fill="none"
    stroke="url(#stroke-grad)"
    stroke-width="5"
    stroke-linejoin="round"
  />

  <!-- Ears — two small squares sitting on top corners -->
  <rect x="28" y="16" width="14" height="14" rx="4"
    fill="none" stroke="url(#stroke-grad)" stroke-width="4.5"
  />
  <rect x="86" y="16" width="14" height="14" rx="4"
    fill="none" stroke="url(#stroke-grad)" stroke-width="4.5"
  />

  <!-- Left eye — circle -->
  <circle cx="48" cy="60" r="8"
    fill="none" stroke="url(#stroke-grad)" stroke-width="4.5"
  />

  <!-- Right eye — circle -->
  <circle cx="80" cy="60" r="8"
    fill="none" stroke="url(#stroke-grad)" stroke-width="4.5"
  />

  <!-- Mouth — simple arc -->
  <path d="M50 82 Q64 94 78 82"
    fill="none" stroke="url(#stroke-grad)" stroke-width="4.5" stroke-linecap="round"
  />
</svg>
