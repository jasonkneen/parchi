        <span class="panel-title">Settings</span>
    </div>
    <div class="settings-content">
        <div class="settings-tabs">
            <button id="settingsTabProvidersBtn" class="settings-tab-button active" data-tab="providers">Providers</button>
            <button id="settingsTabProfilesBtn" class="settings-tab-button" data-tab="profiles">Profiles</button>
            <button id="settingsTabDesignBtn" class="settings-tab-button" data-tab="design">Appearance</button>

        <div id="settingsTabProviders" class="tab-panel" data-tab="providers"></div>
        <div id="settingsTabProfiles" class="tab-panel hidden" data-tab="profiles"></div>
