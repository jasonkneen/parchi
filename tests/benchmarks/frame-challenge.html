<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frame Challenge</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; padding: 12px; background: #0f172a; color: #e2e8f0; }
      input, button { width: 100%; margin: 6px 0; padding: 8px; border-radius: 6px; border: 1px solid #334155; }
      button { cursor: pointer; background: #22c55e; border: none; color: #052e16; font-weight: 700; }
      #msg { min-height: 20px; font-size: 12px; color: #fde68a; }
    </style>
  </head>
  <body>
    <h4>Operations Room Access</h4>
    <input id="city" placeholder="City" />
    <input id="floor" placeholder="Floor" />
    <input id="room" placeholder="Room" />
    <button id="solve">Generate Access Code</button>
    <div id="msg"></div>
    <script>
      const city = document.getElementById('city');
      const floor = document.getElementById('floor');
      const room = document.getElementById('room');
      const msg = document.getElementById('msg');
      document.getElementById('solve').addEventListener('click', () => {
        const ok = city.value.trim().toLowerCase() === 'austin' && floor.value.trim() === '4' && room.value.trim() === '12b';
        if (!ok) {
          msg.textContent = 'Invalid room tuple.';
          return;
        }
        const code = 'ROOM-42';
        msg.textContent = `Access granted: ${code}`;
        parent.postMessage({ type: 'frame-complete', code }, '*');
      });
    </script>
  </body>
</html>
